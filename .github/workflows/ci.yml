name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install
        run: |
          python -m pip install -U pip
          pip install ".[dev]"
      - name: Lint (ruff)
        run: |
          pip install ruff
          ruff check src tests
      - name: Type-check (mypy)
        run: |
          mypy src/neuroembed
      - name: Test
        run: |
          pytest tests/ -q --cov=neuroembed --cov-report=xml
      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: coverage.xml

  docker:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Build CPU image
        run: docker build --target cpu -t neuroembed:ci .
      - name: Smoke test
        run: |
          docker run -d --name neuroembed -p 8000:8000 neuroembed:ci
          sleep 5
          curl -fsS http://localhost:8000/healthz | grep '"status":"ok"'
          docker rm -f neuroembed
